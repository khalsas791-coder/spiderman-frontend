<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider-Man | Premium Login</title>
  <meta name="description" content="Cinematic Spider-Man login experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="cinematic-auth">

  <!-- CINEMATIC BACKGROUND -->
  <div class="cinematic-bg" id="parallaxBg">
    <div class="layer layer-sky"></div>
    <div class="layer layer-city-far"></div>
    <div class="layer layer-city-mid"></div>
    <div class="layer layer-city-near"></div>
    
    <!-- Dynamic Elements -->
    <div class="particles" id="particles"></div>
    <div class="light-streaks"></div>
    
    <!-- Animated Spidey -->
    <div class="spidey-swinger" id="spideySwinger">
      <div class="spidey-body"></div>
      <div class="web-line"></div>
    </div>

    <!-- Success Hero Pose (Hidden by default) -->
    <div class="hero-landing" id="heroLanding">
      <div class="hero-spidey"></div>
    </div>
  </div>

  <div class="vignette"></div>

  <!-- MAIN AUTH CONTAINER -->
  <main class="auth-container" id="authContainer">
    
    <!-- GLASSMORPHISM BOX -->
    <div class="auth-glass-box" id="authBox">
      
      <!-- LOGO SECTION -->
      <div class="auth-header">
        <div class="brand-mask">
          <div class="mask-eyes">
            <div class="eye eye-left" id="eyeLeft"></div>
            <div class="eye eye-right" id="eyeRight"></div>
          </div>
        </div>
        <h1 class="brand-title">SPIDER-MAN</h1>
        <p class="brand-sub">The Multiverse Awaits</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">LOGIN</button>
        <button class="auth-tab" id="tabSignup" onclick="showTab('signup')">SIGN UP</button>
      </div>

      <!-- FEEDBACK -->
      <div class="auth-alert" id="authAlert"></div>

      <!-- FORMS -->
      <div class="forms-wrapper">
        <!-- LOGIN -->
        <form id="loginForm" class="auth-form active">
          <div class="input-group">
            <label for="loginEmail">HERO IDENTITY (EMAIL)</label>
            <div class="input-wrapper">
              <input type="email" id="loginEmail" placeholder="peter.parker@stark.com" required autocomplete="email">
              <div class="web-focus-effect"></div>
            </div>
          </div>
          <div class="input-group">
            <label for="loginPassword">SECRET CODE (PASSWORD)</label>
            <div class="input-wrapper">
              <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
              <div class="web-focus-effect"></div>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="loginBtn">
            <span class="btn-content">
               <span class="btn-text">SWING IN</span>
               <div class="btn-web-container"></div>
            </span>
          </button>
        </form>

        <!-- SIGNUP -->
        <form id="signupForm" class="auth-form">
          <div class="input-group">
            <label for="signupName">FULL NAME</label>
            <div class="input-wrapper">
              <input type="text" id="signupName" placeholder="Peter Parker" required autocomplete="name">
              <div class="web-focus-effect"></div>
            </div>
          </div>
          <div class="input-group">
            <label for="signupEmail">EMAIL</label>
            <div class="input-wrapper">
              <input type="email" id="signupEmail" placeholder="peter@spidey.com" required autocomplete="email">
              <div class="web-focus-effect"></div>
            </div>
          </div>
          <div class="input-group">
            <label for="signupPassword">PASSWORD</label>
            <div class="input-wrapper">
              <input type="password" id="signupPassword" placeholder="Minimum 6 characters" required autocomplete="new-password">
              <div class="web-focus-effect"></div>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="signupBtn">
            <span class="btn-content">
               <span class="btn-text">JOIN THE FIGHT</span>
               <div class="btn-web-container"></div>
            </span>
          </button>
        </form>
      </div>

      <!-- FOOTER -->
      <div class="auth-footer">
        <a href="index.html" class="home-link">← Return to Safety</a>
      </div>
    </div>
  </main>

  <!-- IMPACT ELEMENTS -->
  <div class="web-shoot-overlay" id="webShootOverlay"></div>
  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- LOADER -->
  <div class="web-loader-overlay" id="webLoader">
    <div class="web-spinner">
      <div class="spider-center">🕷️</div>
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" class="web-ring"></circle>
      </svg>
    </div>
    <p>Spinning webs...</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
